<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Jobs Archive</title>
  <style>
    :root { color-scheme: light; --ink: #1d2433; --muted: #667085; --line: #d9dee8; --accent: #146c5f; --bg: #f7f8fb; --panel: #ffffff; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial, sans-serif; color: var(--ink); background: var(--bg); }
    header { background: #ffffff; border-bottom: 1px solid var(--line); }
    .wrap { width: min(1120px, calc(100% - 32px)); margin: 0 auto; }
    .top { display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 24px 0; }
    h1 { margin: 0; font-size: clamp(1.7rem, 3vw, 2.8rem); letter-spacing: 0; }
    .subtitle { color: var(--muted); margin: 8px 0 0; max-width: 760px; line-height: 1.5; }
    nav { display: flex; gap: 10px; flex-wrap: wrap; }
    nav a, .button { color: var(--accent); border: 1px solid var(--line); background: #fff; padding: 9px 12px; border-radius: 6px; text-decoration: none; font-weight: 700; }
    main { padding: 28px 0 48px; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 12px; margin-bottom: 22px; }
    .stat { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 14px; }
    .stat strong { display: block; font-size: 1.5rem; }
    .toolbar { display: flex; gap: 10px; margin: 18px 0; flex-wrap: wrap; }
    input, select { min-height: 40px; border: 1px solid var(--line); border-radius: 6px; padding: 8px 10px; background: #fff; color: var(--ink); }
    input { flex: 1 1 260px; }
    .grid { display: grid; gap: 14px; }
    .job-card, .archive-row { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 18px; }
    .meta { margin: 0 0 8px; color: var(--muted); font-size: .9rem; font-weight: 700; }
    h2 { margin: 0; font-size: 1.2rem; letter-spacing: 0; line-height: 1.35; }
    h2 a { color: var(--ink); text-decoration-color: var(--accent); }
    .company, .location { margin: 8px 0 0; color: var(--muted); }
    .description { line-height: 1.5; color: #3d4758; }
    .tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .tags span { border: 1px solid #bdd8d3; color: #0f5c51; background: #eef8f6; padding: 4px 7px; border-radius: 999px; font-size: .8rem; }
    .empty { background: #fff; border: 1px dashed var(--line); border-radius: 8px; padding: 18px; color: var(--muted); }
    footer { border-top: 1px solid var(--line); padding: 22px 0; color: var(--muted); background: #fff; }
    @media (max-width: 720px) { .top { align-items: flex-start; flex-direction: column; } }
    </style>
</head>
<body>
  <header>
    <div class="wrap top">
      <div>
        <h1>Jobs Archive</h1>
        <p class="subtitle">Past weekly job snapshots. The home page stays focused on the current week only.</p>
      </div>
      <nav><a href="./index.html">Current</a><a href="./archives.html">Archives</a></nav>
    </div>
  </header>
  <main class="wrap"><section class="grid">
            <article class="archive-row">
              <p class="meta">2026-05-25 through 2026-05-31</p>
              <h2><a href="./archives/2026-W22.json">2026-W22</a></h2>
              <p class="company">167 jobs</p>
            </article>
            

            <article class="archive-row">
              <p class="meta">2026-05-18 through 2026-05-24</p>
              <h2><a href="./archives/2026-W21.json">2026-W21</a></h2>
              <p class="company">224 jobs</p>
            </article>
            </section></main>
  <footer><div class="wrap">Generated 2026-06-04T18:12:58.178296+00:00</div></footer>
</body>
</html>
